# ISUCON競技サーバー上で実行するOBI (OpenTelemetry eBPF Instrumentation) のcompose定義
# 参照元: https://opentelemetry.io/docs/zero-code/obi/setup/docker/
#         https://opentelemetry.io/docs/zero-code/obi/security/
services:
  obi:
    # 開発版は main タグ、安定運用したい場合はバージョンタグ(例: v2.x.x)に固定すること
    # https://opentelemetry.io/docs/zero-code/obi/setup/docker/ 記載のイメージ
    image: otel/ebpf-instrument:main
    # ホストの対象プロセスと同じPID namespaceに入るために必須
    pid: host
    # --privileged は使わず、必要な capability のみを付与する
    cap_add:
      - BPF
      - NET_RAW
      - NET_ADMIN
      - PERFMON
      - DAC_READ_SEARCH
      - CHECKPOINT_RESTORE
      - SYS_PTRACE
      # クラウド環境(AKS/EKS等 perf_event_paranoid設定次第)やカーネル5.11未満で必要になる場合がある
      - SYS_ADMIN
    volumes:
      - ./config.yaml:/etc/obi/config.yaml:ro
    environment:
      OTEL_EBPF_CONFIG_PATH: /etc/obi/config.yaml
      # config.yaml の値を一時的に上書きしたい場合は以下のように環境変数を追加できる
      # OTEL_EBPF_LOG_LEVEL: DEBUG
    restart: unless-stopped
